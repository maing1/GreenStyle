<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout — GreenStyle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

 <!-- Navbar -->
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <a class="navbar-brand logo"
         href="https://www.un.org/sustainabledevelopment/sustainable-consumption-production/"
         target="_blank">
        green<em>style</em>.
      </a>
      <button class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="gallery.html">Gallery</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="collection.html">Collection</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="checkout.html">Checkout</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contact.html">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <!-- Billing Form -->
    <div class="col-md-8 order-md-1">
      <h4>Billing Details</h4>
      <form>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label>First Name</label>
            <input type="text" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label>Last Name</label>
            <input type="text" class="form-control" required>
          </div>
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input type="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label>Address</label>
          <input type="text" class="form-control" required>
        </div>

        <div class="row">
          <div class="col-md-5 mb-3">
            <label>Country</label>
            <select class="form-select">
              <option>Kenya</option>
              <option>Uganda</option>
              <option>Tanzania</option>
            </select>
          </div>

          <div class="col-md-4 mb-3">
            <label>City</label>
            <input type="text" class="form-control">
          </div>

          <div class="col-md-3 mb-3">
            <label>ZIP</label>
            <input type="text" class="form-control">
          </div>

        </div>
        <hr>
        <h4>Payment</h4>
        <div class="form-check">
          <input class="form-check-input" type="radio" checked>
          <label class="form-check-label">Credit Card</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio">
          <label class="form-check-label">M-Pesa</label>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="radio">
          <label class="form-check-label">PayPal</label>
        </div>

        <button class="btn checkout-btn w-100" type="submit">
          Place Order
        </button>
      </form>
    </div>
  </div>
</main>
</body>
